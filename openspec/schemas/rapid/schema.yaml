name: rapid
version: 1
description: Minimal workflow for quick changes
artifacts:
  - id: proposal
    generates: proposal.md
    description: High-level description of the change, its motivation, and scope
    template: proposal.md
    requires: []
  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    requires: [proposal]
apply:
  requires:
    - tasks
  tracks: tasks.md
